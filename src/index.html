<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SpotPlug Control Panel</title>
    <style>
      :root {
        --primary: #1db954;
        --primary-hover: #1ed760;
        --bg-dark: #121212;
        --card-bg: #1e1e1e;
        --text-main: #ffffff;
        --text-dim: #b3b3b3;
      }

      /* #region Main stuff */

      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      .app-container {
        width: 90%;
        max-width: 600px;
        background: var(--card-bg);
        padding: 30px;
        border-radius: 16px;
        margin-top: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-sizing: border-box;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
      }

      h1 {
        font-size: 1.8rem;
        margin: 0;
        background: linear-gradient(45deg, #1db954, #1ed760);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin-top: 8px;
      }

      /* #endregion */

      /* #region Custom title bar */

      .controls {
        display: flex;
        justify-content: center;
        margin-bottom: 25px;
      }

      .title-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 35px;
        background: rgba(0, 0, 0, 0.3);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }

      .drag-region {
        flex-grow: 1;
        height: 100%;
        -webkit-app-region: drag; 
        display: flex;
        align-items: center;
        padding-left: 15px;
      }

      .app-title {
        font-size: 0.75rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .window-controls {
        display: flex;
        height: 100%;
        -webkit-app-region: no-drag;
      }

      .control-btn {
        background: transparent;
        border: none;
        color: var(--text-dim);
        width: 45px;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background 0.2s;
      }

      .control-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .control-btn.close:hover {
        background: #ff453a;
        color: white;
      }

      /* #endregion */

      /* #region Status bar */

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 30px;
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.03);
        margin-top: 50px;
        padding: 0 15px;
        border-radius: 8px;
        font-size: 0.7rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-sizing: border-box;
      }

      .status-left {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transition: background 0.3s, box-shadow 0.3s;
      }

      .status-middle {
        flex-grow: 1;
        margin: 0 10px;
        white-space: nowrap;
        overflow: hidden;
        position: relative;
      }

      #track-info {
        display: inline-block; 
        padding-left: 100%;
        animation: marquee 7s linear infinite;
      }

      @keyframes marquee {
        0% { transform: translate(0, 0); }
        100% { transform: translate(-100%, 0); }
      }

      .status-right {
        width: 100px;
        text-align: right;
        color: var(--primary);
        font-weight: bold;
      }

      /* #endregion */

      /* #region Settings area */

      .setting {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 10px;
      }

      .server-port {
        background: #2a2a2a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        width: 80px;
        text-align: center;
        outline: none;
        list-style: none;
      }

      .server-port:focus {
        border-color: var(--primary);
      }

      .server-state {
        width: auto;
        padding: 8px 20px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        border-radius: 8px;
      }

      /* #endregion */

      /* #region progress bar */

      .progress-container {
        width: 100%;
        max-width: 600px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 0 0 8px 8px;
        overflow: hidden;
        margin-top: -1px;
      }

      .progress-fill {
        height: 100%;
        width: 50%;
        background: var(--primary);
        box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        transition: width 0.3s ease; /* Smooths the movement */
      }

      /* #endregion */

    </style>
  </head>
  <body>

    <!-- Custom title bar, dragging, minimizing and closing -->
    <div class="title-bar">
      <div class="drag-region">
        <span class="app-title">SpotPlug Companion</span>
      </div>
      <div class="window-controls">
        <button id="min-btn" class="control-btn">—</button>
        <button id="close-btn" class="control-btn close">✕</button>
      </div>
    </div>

    <!-- SpotPlug Spicetify socket-client status information -->
    <div class="status-bar">
      <div class="status-left">
        <div id="status-dot" class="dot" style="background:#ff453a; box-shadow: 0 0 5px #ff453a;"></div>
        <span id="status-text">Disconnected</span>
      </div>
      
      <div class="status-middle">
        <span id="track-info">Waiting for data...</span>
      </div>
      
      <div class="status-right">
        <span id="play-state-icon">⏸</span>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div id="progress-bar" class="progress-fill"></div>
    </div>

    <!-- Basic information -->
    <div class="app-container">
        <h1><u>SpotPlug</u></h1>
        <p class="subtitle">Local Spotify Widget Hosting Service</p>
        <!-- Added id="connection-url" -->
        <p>Connect your client to <u id="connection-url">http://localhost:8000</u> to get started</p>
    </div>

    <!-- Server settings -->
    <div class="app-container">
      <h1><u>Settings</u></h1>

      <!-- Toggle the socket server on and off -->
      <div class="setting">
        <p><b>Server state:</b></p>
        <button class="server-state" onclick="toggle_app_state()">Stop/Start Server</button>
      </div>

      <!-- Change the socket servers' port -->
      <div class="setting">
        <p><b>Port number:</b></p>
        <input class="server-port" placeholder="8000" type="number">
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
